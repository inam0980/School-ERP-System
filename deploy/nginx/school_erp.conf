# /etc/nginx/sites-available/school_erp
# Symlink: ln -s /etc/nginx/sites-available/school_erp /etc/nginx/sites-enabled/

upstream school_erp_app {
    server unix:/run/gunicorn/school_erp.sock fail_timeout=0;
}

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL — use certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options            DENY                                          always;
    add_header X-Content-Type-Options     nosniff                                       always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"             always;

    client_max_body_size 20M;

    # Static files — served directly by nginx (fastest)
    location /static/ {
        alias /home/erp/school-erp/ERP/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files — served directly by nginx
    location /media/ {
        alias /home/erp/school-erp/ERP/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Django app → gunicorn unix socket
    location / {
        proxy_pass         http://school_erp_app;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
