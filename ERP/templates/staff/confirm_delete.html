{% extends "base.html" %}
{% block title %}Confirm Delete — Al-Kawthar{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-16">
    <div class="bg-white rounded-2xl border border-red-200 p-8 text-center shadow-sm">

        <!-- Warning Icon -->
        <div class="w-16 h-16 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-5">
            <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
        </div>

        <h1 class="text-xl font-bold text-slate-800 mb-2">Delete Confirmation</h1>
        <p class="text-slate-500 text-sm mb-1">Are you sure you want to permanently delete:</p>
        <p class="text-slate-800 font-semibold text-base bg-red-50 rounded-lg px-4 py-2 my-4 border border-red-100">
            {{ label }}
        </p>
        <p class="text-xs text-red-500 mb-6">This action cannot be undone.</p>

        <form method="post" class="flex gap-3 justify-center">
            {% csrf_token %}
            <a href="javascript:history.back()"
               class="flex-1 px-5 py-2.5 rounded-xl border border-slate-300 text-slate-600 hover:bg-slate-50 transition text-sm font-medium">
               Cancel
            </a>
            <button type="submit"
                    class="flex-1 px-5 py-2.5 rounded-xl bg-red-600 text-white hover:bg-red-700 transition text-sm font-semibold">
                Delete
            </button>
        </form>
    </div>
</div>
{% endblock %}
