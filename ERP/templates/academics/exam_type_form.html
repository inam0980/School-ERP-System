{% extends "base.html" %}
{% block title %}{{ title }} — Al-Kawthar{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <a href="{% url 'academics:exam_type_list' %}"
           class="p-2 rounded-lg border border-slate-200 hover:bg-slate-100 transition">
            <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
        </a>
        <h1 class="text-2xl font-bold text-primary">{{ title }}</h1>
    </div>

    <form method="post" class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 space-y-5">
        {% csrf_token %}
        {% for field in form %}
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<p class="mt-1 text-xs text-red-600">{{ field.errors.0 }}</p>{% endif %}
        </div>
        {% endfor %}
        <div class="flex gap-3 pt-2">
            <button type="submit" class="flex-1 bg-primary text-white font-semibold py-2.5 rounded-lg hover:bg-primary-light transition">Save</button>
            <a href="{% url 'academics:exam_type_list' %}" class="flex-1 text-center border border-slate-300 text-slate-700 font-semibold py-2.5 rounded-lg hover:bg-slate-50 transition">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
