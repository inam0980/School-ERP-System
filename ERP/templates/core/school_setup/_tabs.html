{% with n=request.resolver_match.url_name %}
<div class="flex gap-1 flex-wrap bg-white rounded-xl p-1.5 shadow-sm border border-slate-100 mb-6">
    <a href="{% url 'core:academic_year_list' %}"
       class="px-4 py-2 rounded-lg text-sm font-medium transition
              {% if 'academic_year' in n %}bg-[#1e3a5f] text-white shadow-sm{% else %}text-slate-600 hover:bg-slate-100{% endif %}">
        Academic Years
    </a>
    <a href="{% url 'core:division_list' %}"
       class="px-4 py-2 rounded-lg text-sm font-medium transition
              {% if 'division' in n %}bg-[#1e3a5f] text-white shadow-sm{% else %}text-slate-600 hover:bg-slate-100{% endif %}">
        Divisions
    </a>
    <a href="{% url 'core:grade_list' %}"
       class="px-4 py-2 rounded-lg text-sm font-medium transition
              {% if 'grade' in n %}bg-[#1e3a5f] text-white shadow-sm{% else %}text-slate-600 hover:bg-slate-100{% endif %}">
        Grades
    </a>
    <a href="{% url 'core:section_list' %}"
       class="px-4 py-2 rounded-lg text-sm font-medium transition
              {% if 'section' in n %}bg-[#1e3a5f] text-white shadow-sm{% else %}text-slate-600 hover:bg-slate-100{% endif %}">
        Sections
    </a>
    <a href="{% url 'core:subject_list' %}"
       class="px-4 py-2 rounded-lg text-sm font-medium transition
              {% if 'subject' in n %}bg-[#1e3a5f] text-white shadow-sm{% else %}text-slate-600 hover:bg-slate-100{% endif %}">
        Subjects
    </a>
    <a href="{% url 'core:board_list' %}"
       class="px-4 py-2 rounded-lg text-sm font-medium transition
              {% if 'board' in n %}bg-[#1e3a5f] text-white shadow-sm{% else %}text-slate-600 hover:bg-slate-100{% endif %}">
        Boards
    </a>
</div>
{% endwith %}
